<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="img/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?  family=Outfit:wght@100..900&display=swap"     rel="stylesheet">
    <title>NFT Viewer</title>
</head>
<body>
    <div class="container">
        <div class="portada">
            <img src="img/image-equilibrium.jpg" alt="Imagen equilibrium" class="portada_img">
            <div class="portada-overlay">
                <img src="img/icon-view.svg" alt="icon-view" class="overlay-icon">
            </div>
        </div>
        <div class="texto">
            <h1>Equilibrium #3429</h1>
            <h2>Our Equilibrium collection promotes balance and calm</h2>
        </div>
        <div class="bottom">
            <div class="ethereum">
                <img src="img/icon-ethereum.svg" alt="icon_ethereum" class="eth-icon">
                <span class="eth-price">0.041 ETH</span>
                <img src="img/icon-clock.svg" alt="icon_watch" class="clock-icon">
                <span class="clock-time">3 days left</span>
            </div>
            <hr class="divider">
            <div class="creator">
                <img src="img/image-avatar.png" alt="imagen de avatar" class="avatar">
                <p class="creator-label">Creation of <span class="creator-name">Jules Wyvern</span></p>
            </div>
        </div>
    </div>
</body>
</html>
